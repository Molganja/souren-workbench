<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>素人种草 · 运营工作台</title>
<style>
  :root{
    --bg:#f4f5f7; --card:#fff; --line:#e6e8eb; --ink:#1f2329; --sub:#646a73;
    --brand:#3370ff; --brand-soft:#eaf0ff; --ok:#1fa971; --warn:#ff8800; --wait:#8a919e;
    --danger:#f53f3f; --tag:#f2f3f5;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);font-size:14px;line-height:1.5}
  .topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:16px;padding:12px 20px;background:#fff;border-bottom:1px solid var(--line)}
  .logo{font-weight:700;font-size:16px;color:var(--brand)}
  .nav{display:flex;gap:4px;margin-left:8px}
  .nav button{border:0;background:none;padding:7px 14px;border-radius:8px;cursor:pointer;color:var(--sub);font-size:14px}
  .nav button.active{background:var(--brand-soft);color:var(--brand);font-weight:600}
  .spacer{flex:1}
  .btn{border:1px solid var(--line);background:#fff;padding:7px 14px;border-radius:8px;cursor:pointer;font-size:13px;color:var(--ink)}
  .btn:hover{border-color:var(--brand);color:var(--brand)}
  .btn.primary{background:var(--brand);color:#fff;border-color:var(--brand)}
  .btn.primary:hover{opacity:.9;color:#fff}
  .btn.sm{padding:4px 10px;font-size:12px;border-radius:6px}
  .btn.ghost{border:0;color:var(--sub)}
  .wrap{max-width:1100px;margin:0 auto;padding:20px}
  h2.section{font-size:15px;margin:0 0 14px}
  .muted{color:var(--sub)}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:16px}
  .case-card{cursor:pointer;transition:.15s}
  .case-card:hover{border-color:var(--brand);box-shadow:0 4px 14px rgba(51,112,255,.08)}
  .case-card h3{margin:0 0 4px;font-size:15px}
  .row{display:flex;align-items:center;gap:8px}
  .row.wrap{flex-wrap:wrap}
  .badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:12px;background:var(--tag);color:var(--sub)}
  .badge.stage{background:var(--brand-soft);color:var(--brand)}
  .pill{font-size:12px;padding:2px 8px;border-radius:20px;font-weight:600}
  .s-wait{background:#f2f3f5;color:var(--wait)}
  .s-report{background:#fff3e0;color:var(--warn)}
  .s-ok{background:#e8f8f0;color:var(--ok)}
  .s-skip{background:#ffece8;color:var(--danger)}
  .mini{font-size:12px;color:var(--sub);margin-top:8px;display:flex;gap:14px;flex-wrap:wrap}
  .mini b{color:var(--ink)}
  /* detail */
  .back{cursor:pointer;color:var(--sub);margin-bottom:12px;display:inline-flex;gap:6px;align-items:center}
  .head-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px 24px;margin-top:10px}
  .field label{display:block;font-size:12px;color:var(--sub);margin-bottom:3px}
  .field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:14px;font-family:inherit;background:#fff}
  .field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:var(--brand)}
  .tabs{display:flex;gap:6px;margin:22px 0 14px;border-bottom:1px solid var(--line)}
  .tabs button{border:0;background:none;padding:10px 4px;margin-right:18px;cursor:pointer;color:var(--sub);font-size:14px;border-bottom:2px solid transparent}
  .tabs button.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
  table{width:100%;border-collapse:collapse}
  th,td{text-align:left;padding:10px 8px;border-bottom:1px solid var(--line);vertical-align:top;font-size:13px}
  th{color:var(--sub);font-weight:600;font-size:12px}
  td .content-cell{white-space:pre-wrap;max-width:380px}
  .acct{font-size:12px;color:var(--sub)}
  .empty{text-align:center;color:var(--sub);padding:40px}
  /* modal */
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:50}
  .modal{background:#fff;border-radius:14px;padding:22px;width:520px;max-width:92vw;max-height:88vh;overflow:auto}
  .modal h3{margin:0 0 16px}
  .modal .field{margin-bottom:12px}
  .modal-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1f2329;color:#fff;padding:9px 18px;border-radius:8px;font-size:13px;opacity:0;transition:.25s;z-index:99}
  .toast.show{opacity:1}
  .today-case{margin-bottom:18px}
  .today-case h4{margin:0 0 8px;font-size:14px;display:flex;gap:8px;align-items:center}
  a.link{color:var(--brand);text-decoration:none}
  a.link:hover{text-decoration:underline}
  .metric-add{display:grid;grid-template-columns:repeat(5,1fr) auto;gap:8px;align-items:end;margin-bottom:14px}
  .hint{background:#fffbe6;border:1px solid #ffe58f;border-radius:8px;padding:10px 12px;font-size:12px;color:#874d00;margin-bottom:16px}
</style>
</head>
<body>
<div class="topbar">
  <div class="logo">素人种草 · 运营工作台</div>
  <div class="nav">
    <button id="nav-today" onclick="go('today')">今日工作台</button>
    <button id="nav-cases" onclick="go('cases')">案例库</button>
  </div>
  <div class="spacer"></div>
  <button class="btn" onclick="exportData()">导出备份</button>
  <button class="btn" onclick="document.getElementById('importFile').click()">导入</button>
  <input type="file" id="importFile" accept="application/json" style="display:none" onchange="importData(event)">
  <button class="btn primary" onclick="openCaseModal()">+ 新建案例</button>
</div>

<div class="wrap" id="app"></div>
<div class="toast" id="toast"></div>

<script>
/* ============ 数据层（localStorage） ============ */
const KEY = 'souren_workbench_v1';
const STAGES = ['起号期','决策期','术后恢复期','成果期','收尾期'];
let state = load();

function load(){
  try{ const d = JSON.parse(localStorage.getItem(KEY)); if(d && d.cases) return d; }catch(e){}
  return { cases: [], view:'today', currentId:null, tab:'plan' };
}
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); }
function uid(){ return 'id'+Date.now().toString(36)+Math.floor(Math.random()*1e4).toString(36); }
function esc(s){ return (s==null?'':String(s)).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function todayStr(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function getCase(id){ return state.cases.find(c=>c.id===id); }

/* ============ 路由 ============ */
function go(view, id){ state.view=view; if(id!==undefined) state.currentId=id; save(); render(); }
function setTab(t){ state.tab=t; save(); render(); }

function render(){
  document.getElementById('nav-today').className = state.view==='today'?'active':'';
  document.getElementById('nav-cases').className = (state.view==='cases')?'active':'';
  const app = document.getElementById('app');
  if(state.view==='detail' && getCase(state.currentId)) app.innerHTML = renderDetail(getCase(state.currentId));
  else if(state.view==='today') app.innerHTML = renderToday();
  else app.innerHTML = renderCases();
}

/* ============ 今日工作台 ============ */
function renderToday(){
  const t = todayStr();
  let pending=[], toVerify=[];
  state.cases.forEach(c=>{
    (c.plan||[]).forEach(p=>{
      if(p.date===t && p.status==='wait') pending.push({c,p});
      if(p.status==='report') toVerify.push({c,p});
    });
  });
  let html = `<h2 class="section">今天要派发的内容 · ${t}</h2>`;
  if(!pending.length) html += `<div class="card empty">今天没有待派发的内容。去「案例库」给案例排内容计划。</div>`;
  else {
    const byCase={};
    pending.forEach(x=>{ (byCase[x.c.id]=byCase[x.c.id]||{c:x.c,items:[]}).items.push(x.p); });
    Object.values(byCase).forEach(g=>{
      html += `<div class="card today-case"><h4>${esc(g.c.weixinNick||'未命名')} <span class="acct">抖音：${esc(g.c.douyinId||'—')}</span> <span class="badge stage">${esc(g.c.stage||'')}</span></h4>`;
      g.items.forEach(p=> html += planRow(g.c, p, true));
      html += `</div>`;
    });
  }
  html += `<h2 class="section" style="margin-top:28px">待核对（兼职已汇报，确认抖音上真发了）</h2>`;
  if(!toVerify.length) html += `<div class="card empty">没有待核对的内容。</div>`;
  else { html += `<div class="card">`; toVerify.forEach(x=> html += planRow(x.c, x.p, true)); html += `</div>`; }
  return html;
}
function planRow(c, p, withCase){
  const tag = withCase ? `<span class="acct">[${esc(c.weixinNick||'')}]</span> ` : '';
  return `<div class="row wrap" style="padding:10px 0;border-bottom:1px solid var(--line)">
    <div style="flex:1;min-width:260px">
      <div>${tag}<b>${esc(p.title||'(无标题)')}</b> ${statusPill(p.status)} <span class="acct">${esc(p.type||'')} · ${esc(p.account||c.douyinId||'')} · ${esc(p.date||'')}</span></div>
      <div class="content-cell muted" style="margin-top:4px">${esc((p.content||'').slice(0,140))}${(p.content||'').length>140?'…':''}</div>
    </div>
    <div class="row">${planActions(c,p)}</div>
  </div>`;
}

/* ============ 案例库 ============ */
function renderCases(){
  if(!state.cases.length) return `<div class="card empty">还没有案例。点右上角「+ 新建案例」开始：填兼职微信昵称、抖音号，归档好，再点进去排每天发什么。</div>`;
  let html = `<h2 class="section">案例库（${state.cases.length}）</h2><div class="grid">`;
  state.cases.forEach(c=>{
    const t=todayStr();
    const todayN=(c.plan||[]).filter(p=>p.date===t&&p.status==='wait').length;
    const verifyN=(c.plan||[]).filter(p=>p.status==='report').length;
    const last=(c.metrics||[]).slice(-1)[0];
    html += `<div class="card case-card" onclick="go('detail','${c.id}')">
      <h3>${esc(c.weixinNick||'未命名兼职')}</h3>
      <div class="row wrap" style="gap:6px"><span class="badge">抖音：${esc(c.douyinId||'—')}</span><span class="badge stage">${esc(c.stage||'—')}</span><span class="badge">${esc(c.project||'—')}</span></div>
      <div class="mini">
        <span>今日待派 <b>${todayN}</b></span>
        <span>待核对 <b>${verifyN}</b></span>
        <span>粉丝 <b>${last?esc(last.fans||'—'):'—'}</b></span>
      </div>
    </div>`;
  });
  return html+`</div>`;
}

/* ============ 案例详情 ============ */
function renderDetail(c){
  let html = `<div class="back" onclick="go('cases')">← 返回案例库</div>`;
  html += `<div class="card">
    <div class="row"><h2 class="section" style="margin:0;flex:1">案例：${esc(c.weixinNick||'未命名')}</h2>
      <button class="btn sm" onclick="openCaseModal('${c.id}')">编辑信息</button>
      <button class="btn sm ghost" style="color:var(--danger)" onclick="delCase('${c.id}')">删除</button>
    </div>
    <div class="head-grid">
      <div><label class="muted" style="font-size:12px">兼职微信昵称</label><div><b>${esc(c.weixinNick||'—')}</b></div></div>
      <div><label class="muted" style="font-size:12px">抖音号</label><div>${esc(c.douyinId||'—')} ${c.douyinUrl?`· <a class="link" href="${esc(c.douyinUrl)}" target="_blank">打开主页核对 ↗</a>`:''}</div></div>
      <div><label class="muted" style="font-size:12px">项目 / 阶段</label><div>${esc(c.project||'—')} · <span class="badge stage">${esc(c.stage||'—')}</span></div></div>
      <div><label class="muted" style="font-size:12px">人设 / 起始</label><div>${esc(c.persona||'—')} · ${esc(c.startDate||'—')}</div></div>
    </div>
  </div>`;

  html += `<div class="tabs">
    <button class="${state.tab==='plan'?'active':''}" onclick="setTab('plan')">内容计划</button>
    <button class="${state.tab==='data'?'active':''}" onclick="setTab('data')">账号数据</button>
  </div>`;

  if(state.tab==='data') html += renderData(c);
  else html += renderPlan(c);
  return html;
}

function renderPlan(c){
  const plan=(c.plan||[]).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  let html = `<div class="row" style="margin-bottom:12px"><button class="btn primary sm" onclick="openPlanModal('${c.id}')">+ 新增一条内容</button>
    <span class="muted" style="margin-left:8px">流程：待发 →（复制发给兼职）→ 兼职汇报已发 → 你打开抖音核对 → 已核对</span></div>`;
  if(!plan.length) return html+`<div class="card empty">还没排内容。点「+ 新增一条内容」写上某天该发什么，工作人员就照着复制给兼职。</div>`;
  html += `<div class="card" style="padding:4px 16px"><table><thead><tr><th>日期</th><th>账号/类型</th><th>内容（要发给兼职的）</th><th>状态</th><th style="width:1%">操作</th></tr></thead><tbody>`;
  plan.forEach(p=>{
    html += `<tr>
      <td>${esc(p.date||'')}</td>
      <td>${esc(p.account||c.douyinId||'')}<br><span class="acct">${esc(p.type||'')}</span></td>
      <td><div class="content-cell"><b>${esc(p.title||'')}</b><br>${esc(p.content||'')}</div></td>
      <td>${statusPill(p.status)}${p.note?`<br><span class="acct">${esc(p.note)}</span>`:''}</td>
      <td><div class="row" style="gap:4px">${planActions(c,p)}<button class="btn sm ghost" onclick="openPlanModal('${c.id}','${p.id}')">改</button><button class="btn sm ghost" style="color:var(--danger)" onclick="delPlan('${c.id}','${p.id}')">删</button></div></td>
    </tr>`;
  });
  return html+`</tbody></table></div>`;
}

function planActions(c,p){
  let h=`<button class="btn sm" onclick="copyContent('${c.id}','${p.id}')">复制</button>`;
  if(p.status==='wait') h+=`<button class="btn sm" onclick="setStatus('${c.id}','${p.id}','report')">兼职已汇报</button>`;
  if(p.status==='report'){
    if(c.douyinUrl) h+=`<button class="btn sm" onclick="window.open('${esc(c.douyinUrl)}','_blank')">看抖音</button>`;
    h+=`<button class="btn sm primary" onclick="setStatus('${c.id}','${p.id}','ok')">已核对</button>`;
  }
  if(p.status==='ok') h+=`<button class="btn sm ghost" onclick="setStatus('${c.id}','${p.id}','wait')">撤回</button>`;
  return h;
}
function statusPill(s){
  const m={wait:['s-wait','待发'],report:['s-report','已汇报待核对'],ok:['s-ok','已核对 ✓'],skip:['s-skip','未发/异常']};
  const x=m[s]||m.wait; return `<span class="pill ${x[0]}">${x[1]}</span>`;
}

function renderData(c){
  const m=(c.metrics||[]).slice().sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  let html = `<div class="hint">v1 是手动录入抖音数据。要做到「自动同步」，需要走抖音开放平台授权 / 第三方数据平台（飞瓜·蝉妈妈）/ 半自动抓链接——确定走哪条路后我再接进来，这张表的字段不用改。</div>`;
  html += `<div class="card"><div class="metric-add">
    <div class="field"><label>日期</label><input id="m-date" value="${todayStr()}"></div>
    <div class="field"><label>粉丝</label><input id="m-fans" type="number"></div>
    <div class="field"><label>播放(累计/条)</label><input id="m-plays" type="number"></div>
    <div class="field"><label>点赞</label><input id="m-likes" type="number"></div>
    <div class="field"><label>评论</label><input id="m-comments" type="number"></div>
    <button class="btn primary" onclick="addMetric('${c.id}')">记录</button>
  </div>`;
  if(!m.length) html += `<div class="empty">还没录数据。</div>`;
  else{
    html += `<table><thead><tr><th>日期</th><th>粉丝</th><th>播放</th><th>点赞</th><th>评论</th><th>较上次涨粉</th><th></th></tr></thead><tbody>`;
    m.forEach((x,i)=>{
      const prev=i>0?m[i-1]:null;
      const df=prev&&x.fans!=null&&prev.fans!=null?(x.fans-prev.fans):null;
      html += `<tr><td>${esc(x.date)}</td><td>${esc(x.fans??'—')}</td><td>${esc(x.plays??'—')}</td><td>${esc(x.likes??'—')}</td><td>${esc(x.comments??'—')}</td>
        <td>${df==null?'—':(df>=0?'+'+df:df)}</td>
        <td><button class="btn sm ghost" style="color:var(--danger)" onclick="delMetric('${c.id}','${x.id}')">删</button></td></tr>`;
    });
    html += `</tbody></table>`;
  }
  return html+`</div>`;
}

/* ============ 操作 ============ */
function copyContent(cid,pid){
  const p=(getCase(cid).plan||[]).find(x=>x.id===pid); if(!p) return;
  const txt=(p.title?p.title+'\n':'')+(p.content||'');
  navigator.clipboard.writeText(txt).then(()=>toast('已复制，去微信粘贴给兼职')).catch(()=>{
    const ta=document.createElement('textarea');ta.value=txt;document.body.appendChild(ta);ta.select();document.execCommand('copy');ta.remove();toast('已复制');
  });
}
function setStatus(cid,pid,s){
  const p=(getCase(cid).plan||[]).find(x=>x.id===pid); if(!p) return;
  p.status=s; if(s==='report')p.reportedAt=todayStr(); if(s==='ok')p.verifiedAt=todayStr();
  save(); render(); toast(s==='ok'?'已标记核对完成':'状态已更新');
}
function addMetric(cid){
  const c=getCase(cid); c.metrics=c.metrics||[];
  const g=id=>{const v=document.getElementById(id).value; return v===''?null:(id==='m-date'?v:Number(v));};
  c.metrics.push({id:uid(),date:g('m-date'),fans:g('m-fans'),plays:g('m-plays'),likes:g('m-likes'),comments:g('m-comments')});
  save(); render(); toast('已记录');
}
function delMetric(cid,mid){ const c=getCase(cid); c.metrics=c.metrics.filter(x=>x.id!==mid); save(); render(); }
function delPlan(cid,pid){ if(!confirm('删除这条内容？'))return; const c=getCase(cid); c.plan=c.plan.filter(x=>x.id!==pid); save(); render(); }
function delCase(cid){ if(!confirm('删除整个案例？这条兼职的所有内容计划和数据都会删掉。'))return; state.cases=state.cases.filter(c=>c.id!==cid); go('cases'); }

/* ============ 弹窗：案例 ============ */
function openCaseModal(id){
  const c=id?getCase(id):{};
  modal(`${id?'编辑':'新建'}案例`,`
    <div class="field"><label>兼职微信昵称 *</label><input id="f-nick" value="${esc(c.weixinNick||'')}"></div>
    <div class="field"><label>抖音号</label><input id="f-dy" value="${esc(c.douyinId||'')}"></div>
    <div class="field"><label>抖音主页链接（用于一键打开核对）</label><input id="f-url" placeholder="https://www.douyin.com/user/..." value="${esc(c.douyinUrl||'')}"></div>
    <div class="field"><label>项目类型</label><input id="f-proj" placeholder="吸脂 / 双眼皮 …" value="${esc(c.project||'')}"></div>
    <div class="field"><label>当前阶段</label><select id="f-stage">${STAGES.map(s=>`<option ${c.stage===s?'selected':''}>${s}</option>`).join('')}</select></div>
    <div class="field"><label>人设简述</label><input id="f-persona" placeholder="如：成都·25岁·上班族" value="${esc(c.persona||'')}"></div>
    <div class="field"><label>起始日期</label><input id="f-start" value="${esc(c.startDate||todayStr())}"></div>
  `,()=>{
    const nick=document.getElementById('f-nick').value.trim();
    if(!nick){toast('请填兼职微信昵称');return false;}
    const data={weixinNick:nick,douyinId:document.getElementById('f-dy').value.trim(),douyinUrl:document.getElementById('f-url').value.trim(),
      project:document.getElementById('f-proj').value.trim(),stage:document.getElementById('f-stage').value,
      persona:document.getElementById('f-persona').value.trim(),startDate:document.getElementById('f-start').value.trim()};
    if(id){ Object.assign(getCase(id),data); }
    else { state.cases.push(Object.assign({id:uid(),plan:[],metrics:[]},data)); }
    save(); render(); toast('已保存'); return true;
  });
}

/* ============ 弹窗：内容计划 ============ */
function openPlanModal(cid,pid){
  const c=getCase(cid); const p=pid?(c.plan||[]).find(x=>x.id===pid):{};
  modal(`${pid?'编辑':'新增'}内容`,`
    <div class="field"><label>发布日期 *</label><input id="p-date" value="${esc(p.date||todayStr())}"></div>
    <div class="field"><label>用哪个号发（默认本案例抖音号，可填测试号等）</label><input id="p-acct" value="${esc(p.account||c.douyinId||'')}"></div>
    <div class="field"><label>类型</label><select id="p-type"><option ${p.type==='种草'?'selected':''}>种草</option><option ${p.type==='养号'?'selected':''}>养号</option></select></div>
    <div class="field"><label>标题/选题</label><input id="p-title" value="${esc(p.title||'')}"></div>
    <div class="field"><label>内容正文（要复制给兼职去发的）*</label><textarea id="p-content" rows="6">${esc(p.content||'')}</textarea></div>
    <div class="field"><label>备注</label><input id="p-note" value="${esc(p.note||'')}"></div>
  `,()=>{
    const content=document.getElementById('p-content').value.trim();
    const date=document.getElementById('p-date').value.trim();
    if(!date||!content){toast('日期和内容正文必填');return false;}
    const data={date,account:document.getElementById('p-acct').value.trim(),type:document.getElementById('p-type').value,
      title:document.getElementById('p-title').value.trim(),content,note:document.getElementById('p-note').value.trim()};
    if(pid){ Object.assign(p,data); }
    else { c.plan=c.plan||[]; c.plan.push(Object.assign({id:uid(),status:'wait'},data)); }
    save(); render(); toast('已保存'); return true;
  });
}

/* ============ 通用弹窗 ============ */
function modal(title,body,onSave){
  const bg=document.createElement('div'); bg.className='modal-bg';
  bg.innerHTML=`<div class="modal"><h3>${esc(title)}</h3>${body}<div class="modal-actions"><button class="btn" id="m-cancel">取消</button><button class="btn primary" id="m-save">保存</button></div></div>`;
  document.body.appendChild(bg);
  const close=()=>bg.remove();
  bg.querySelector('#m-cancel').onclick=close;
  bg.onclick=e=>{ if(e.target===bg) close(); };
  bg.querySelector('#m-save').onclick=()=>{ if(onSave()!==false) close(); };
}

/* ============ 备份 / 提示 ============ */
function exportData(){
  const blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='种草工作台备份_'+todayStr()+'.json'; a.click(); toast('已导出备份');
}
function importData(e){
  const f=e.target.files[0]; if(!f)return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result); if(d&&d.cases){ state=d; state.view='cases'; save(); render(); toast('导入成功'); } else toast('文件格式不对'); }catch(err){ toast('导入失败'); } };
  r.readAsText(f); e.target.value='';
}
let toastTimer;
function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),1800); }

render();
</script>
